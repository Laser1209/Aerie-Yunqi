<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Aerie Ball</title>
  <link rel="stylesheet" href="styles/floating-ball.css">
</head>
<body>
  <div class="ball-scene" id="ball-scene">
    <div class="ball" id="ball" title="Aerie · 云栖">A</div>
    <div class="ball-dialog" id="ball-dialog" role="dialog" aria-label="Aerie 快捷操作">
      <div class="ball-dialog-title">想做什么？</div>
      <div class="ball-dialog-actions">
        <button class="ball-dialog-btn ghost" data-action="close">收起</button>
        <button class="ball-dialog-btn" data-action="open-main">展开主窗口</button>
        <button class="ball-dialog-btn" data-action="open-wide">展开侧边栏</button>
      </div>
    </div>
  </div>
  <script src="js/floating-ball.js"></script>
</body>
</html>
