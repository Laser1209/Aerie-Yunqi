﻿# Aerie · 云栖 v0.1.0-beta.1 — electron-builder configuration
# This file is the source of truth for Windows packaging.
# `package.json` mirrors the same settings under `build` for npm run build:win.
appId: com.laser.aerie
productName: Aerie · 云栖
copyright: Copyright © 2026 Laser
artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  output: dist
  buildResources: builder
  outputResources: resources

files:
  - "src/**/*"
  - "builder/icon.ico"
  - "package.json"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/{__pycache__,*.pyc,*.pyo,*.pyd,*.egg-info}"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{.idea,.vscode,.editorconfig,.travis.yml,.npmrc}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

asar: true
asarUnpack:
  - "**/*.node"

# Windows-specific target: NSIS installer + Portable
win:
  icon: builder/icon.ico
  target:
    - target: nsis
      arch:
        - x64
      artifactName: ${productName}-${version}-Setup.${ext}
    - target: portable
      arch:
        - x64
      artifactName: ${productName}-${version}-portable.${ext}
  requestedExecutionLevel: requireAdministrator
  publisherName: Laser
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

# Extra resources: Python runtime, icon, etc. (goes to resources/ in installed dir)
extraResources:
  - from: "../Aerie · 云栖.png"
    to: "icon.png"
  - from: "../.env.example"
    to: ".env.example"
  - from: "../"
    to: "python"
    filter:
      - "main.py"
      - "core/**"
      - "config/**"
      - "communication/**"
      - "knowledge/**"
      - "memory/**"
      - "emotion/**"
      - "persona/**"
      - "scheduler/**"
      - "tools/__init__.py"
      - "tools/browser_tools.py"
      - "tools/douyin_tools.py"
      - "tools/compute_tools.py"
      - "tools/restart_helper.ps1"
      - "skills/local/*/SKILL.md"
      - "skills/local/*/run.py"
      - "skills/data/*/SKILL.md"
      - "skills/data/*/run.py"
      - "douyin-mcp/src/douyin_creator_mcp/**"
      - "NapCat/NapCat.Shell/**"
      - ".env.example"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!data/**"
      - "!logs/**"
      - "!NapCat/NapCat.Shell/cache/**"
      - "!NapCat/NapCat.Shell/config/**"
      - "!douyin-mcp/data/**"
      - "!douyin-mcp/.env"
  - from: "../.venv"
    to: "python/.venv"
    filter:
      - "**/*"
      - "!Lib/site-packages/pip/**"
      - "!Lib/site-packages/setuptools/**"
      - "!Lib/site-packages/wheel/**"
      - "!Scripts/pip*"
      - "!Scripts/activate*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"

# NSIS installer options
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Aerie · 云栖
  deleteAppDataOnUninstall: false
  include: builder/installer.nsh
  displayLanguageSelector: false
  installerLanguages:
    - simpchinese
    - enus
  language: "2052"

# Additional metadata
extraMetadata:
  main: src/main.js
  author:
    name: Laser
    email: laser@local

# Publish (no auto-update server; user manually reinstalls)
publish: null
