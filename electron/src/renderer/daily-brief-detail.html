<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完整日报 / Full Daily Brief</title>
  <link rel="stylesheet" href="styles/daily-brief.css" />
  <link rel="stylesheet" href="styles/daily-brief-detail.css" />
</head>
<body class="detail-body">
  <div class="detail-shell" id="detail-shell">
    <header class="detail-header">
      <div class="detail-header__left">
        <h1 class="detail-title" id="detail-title">每日简报 / Daily Brief</h1>
        <span class="detail-date" id="detail-date">—</span>
      </div>
      <div class="detail-header__right">
        <button class="detail-btn" id="detail-refresh" aria-label="刷新 / Refresh">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
          <span>刷新</span>
        </button>
        <button class="detail-btn detail-btn--primary" id="detail-export" aria-label="导出 / Export">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          <span>导出 HTML</span>
        </button>
        <button class="detail-btn detail-btn--close" id="detail-close" aria-label="关闭 / Close">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </header>

    <main class="detail-main" id="detail-main">
      <!-- 5 detail sections -->
      <section class="detail-section" data-section="ai_news">
        <header class="detail-section__header">
          <h2>AI 动向 / AI Trends</h2>
          <span class="detail-section__count" id="detail-ai-news-count">0</span>
        </header>
        <ul class="detail-list" id="detail-ai-news"></ul>
      </section>

      <section class="detail-section" data-section="it_news">
        <header class="detail-section__header">
          <h2>IT 行业 / Tech Industry</h2>
          <span class="detail-section__count" id="detail-it-news-count">0</span>
        </header>
        <ul class="detail-list" id="detail-it-news"></ul>
      </section>

      <section class="detail-section" data-section="intl_news">
        <header class="detail-section__header">
          <h2>国际新闻 / International</h2>
          <span class="detail-section__count" id="detail-intl-news-count">0</span>
        </header>
        <ul class="detail-list" id="detail-intl-news"></ul>
      </section>

      <section class="detail-section" data-section="cn_news">
        <header class="detail-section__header">
          <h2>国家新闻 / National</h2>
          <span class="detail-section__count" id="detail-cn-news-count">0</span>
        </header>
        <ul class="detail-list" id="detail-cn-news"></ul>
      </section>

      <section class="detail-section detail-section--weather" data-section="weather">
        <header class="detail-section__header">
          <h2>天气 / Weather</h2>
        </header>
        <div class="detail-weather" id="detail-weather">
          <span class="detail-weather__city" id="detail-weather-city">—</span>
          <span class="detail-weather__desc" id="detail-weather-desc">（暂无）</span>
          <span class="detail-weather__hint" id="detail-weather-hint"></span>
        </div>
      </section>
    </main>

    <footer class="detail-footer">
      <span>有想看的部分，告诉我。</span>
    </footer>
  </div>

  <script src="daily-brief-detail.js"></script>
</body>
</html>
