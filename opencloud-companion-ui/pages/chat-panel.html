    <style id="theme-vars">
/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

    </style>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* ===== Desktop Scene ===== */
      .desktop-scene {
        width: 1440px;
        height: 900px;
        background: linear-gradient(160deg, #a8c8f0 0%, #7ba7d9 25%, #5b93cc 50%, #4a80b8 75%, #6a9fd4 100%);
        position: relative;
        overflow: hidden;
        font-family: var(--font-sans);
      }
      .desktop-scene::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,255,255,0.15), transparent),
          radial-gradient(ellipse 50% 50% at 80% 70%, rgba(255,255,255,0.10), transparent);
        pointer-events: none;
      }

      /* Taskbar */
      .taskbar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.4);
        display: flex;
        align-items: center;
        padding: 0 16px;
        z-index: 50;
      }
      .taskbar-start {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: linear-gradient(135deg, #0078d4, #00bcf2);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .taskbar-search {
        margin-left: 12px;
        height: 32px;
        width: 260px;
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 6px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 12px;
        color: var(--text-400);
      }
      .taskbar-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: 4px;
        cursor: default;
      }
      .taskbar-icon:hover {
        background: rgba(0,0,0,0.04);
      }
      .taskbar-clock {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-800);
        text-align: right;
        line-height: 1.3;
      }

      /* Desktop Icons */
      .desktop-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 76px;
        cursor: default;
        padding: 8px 4px;
        border-radius: 8px;
      }
      .desktop-icon:hover {
        background: rgba(255,255,255,0.18);
      }
      .desktop-icon-img {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }
      .desktop-icon-label {
        font-size: 11px;
        color: white;
        text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        text-align: center;
        line-height: 1.3;
      }

      /* Floating Ball (dimmed, panel is open) */
      .floating-ball {
        position: absolute;
        top: 24px;
        right: 436px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1.5px solid rgba(255,255,255,0.3);

        align-items: center;
        justify-content: center;

        opacity: 0.45;
        cursor: default;
      }
      .floating-ball-inner {
        width: 24px;
        height: 24px;

        box-shadow: 0 2px 8px rgba(0,122,255,0.35);

      .chat-panel {
        position: absolute;
        top: 50%;
        right: 32px;
        transform: translateY(-50%);

        height: 620px;

        overflow: hidden;
        z-index: 100;
      }

      /* Panel Header */
      .panel-header {
        padding: 16px 20px 14px;
        border-bottom: 1px solid var(--background-300);
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .panel-header-info {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
      }
      .panel-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--brand-300), var(--brand-500));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 15px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .panel-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-800);
        line-height: 1.2;
      }
      .panel-status {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 2px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--state-success);
        flex-shrink: 0;
      }
      .status-text {
        font-size: 11px;
        color: var(--text-400);
      }
      .panel-subtitle {
        font-size: 11px;
        color: var(--text-400);
        margin-left: 4px;
      }
      .panel-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .panel-action-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        color: var(--text-400);
        transition: background 0.15s;
      }
      .panel-action-btn:hover {
        background: var(--background-200);
      }
      .panel-action-btn [data-icon] {
        width: 16px;
        height: 16px;
      }

      /* Chat Messages */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .chat-messages::-webkit-scrollbar {
        width: 4px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.12);
        border-radius: 2px;
      }

      .time-divider {
        text-align: center;
        font-size: 11px;
        color: var(--text-400);
        padding: 10px 0 6px;
      }

      .msg-row {
        display: flex;
        margin-bottom: 2px;
      }
      .msg-row.ai {
        justify-content: flex-start;
      }
      .msg-row.user {
        justify-content: flex-end;
      }

      .msg-bubble {
        max-width: 280px;
        padding: 10px 14px;
        font-size: 13.5px;
        line-height: 1.55;
        word-break: break-word;
      }
      .msg-row.ai .msg-bubble {
        background: var(--brand-50);
        color: var(--text-800);
        border-radius: 18px 18px 18px 6px;
      }
      .msg-row.user .msg-bubble {
        background: var(--brand-500);
        color: white;
        border-radius: 18px 18px 6px 18px;
      }

      /* News cards inside bubble */
      .news-cards {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .news-card {
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: default;
        transition: background 0.15s;
      }
      .news-card:hover {
        background: rgba(255,255,255,0.9);
      }
      .news-card-title {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-800);
        line-height: 1.4;
        margin-bottom: 3px;
      }
      .news-card-meta {
        font-size: 11px;
        color: var(--text-400);
      }

      /* Input Area */
      .input-area {
        padding: 12px 20px 16px;
        border-top: 1px solid var(--background-300);
        flex-shrink: 0;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--background-200);
        border-radius: 14px;
        padding: 4px 4px 4px 6px;
        border: 1px solid transparent;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .input-row:focus-within {
        border-color: var(--brand-300);
        box-shadow: 0 0 0 3px rgba(0,122,255,0.08);
      }
      .mic-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-400);
        cursor: default;
        flex-shrink: 0;
        transition: color 0.15s;
      }
      .mic-btn:hover {
        color: var(--text-600);
      }
      .mic-icon-css {
        width: 16px;
        height: 16px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .mic-icon-css::before {
        content: '';
        width: 8px;
        height: 12px;
        border-radius: 4px;
        background: currentColor;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .mic-icon-css::after {
        content: '';
        width: 12px;
        height: 8px;
        border: 2px solid currentColor;
        border-top: none;
        border-radius: 0 0 6px 6px;
        margin-top: -1px;
      }
      .chat-input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 13.5px;
        font-family: var(--font-sans);
        color: var(--text-800);
        outline: none;
        padding: 6px 4px;
        line-height: 1.4;
      }
      .chat-input::placeholder {
        color: var(--text-400);
      }
      .send-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--brand-500);
        color: white;
        flex-shrink: 0;
        cursor: default;
        transition: transform 0.1s, box-shadow 0.15s;
      }
      .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 2px 8px rgba(0,122,255,0.3);
      }
      .send-btn [data-icon] {
        width: 16px;
        height: 16px;
      }
      .input-hint {
        text-align: center;
        font-size: 10.5px;
        color: var(--text-400);
        margin-top: 8px;
        opacity: 0.7;
      }
      .input-hint kbd {
        background: var(--background-200);
        border: 1px solid var(--background-300);
        border-radius: 4px;
        padding: 0.5px 4px;
        font-family: var(--font-mono);
        font-size: 10px;
      }

      /* ===== Design Annotations ===== */
      .annotation {
        position: absolute;
        z-index: 200;
        pointer-events: none;
      }
      .annotation-label {
        font-size: 12px;
        color: var(--text-800);
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(8px);
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid var(--background-300);
        box-shadow: var(--shadow-sm);
        white-space: nowrap;
        font-family: var(--font-sans);
        letter-spacing: 0.01em;
      }
      .annotation-arrow {
        position: absolute;
        background: var(--background-400);
      }
      /* Arrow: panel annotation */
      .annotation-panel .annotation-label {
        position: absolute;
        right: 450px;
        top: 50%;
        transform: translateY(-50%);
      }
      .annotation-panel .annotation-arrow {
        right: 442px;
        top: 50%;
        transform: translateY(-50%) rotate(0deg);
        width: 12px;
        height: 1.5px;
      }
      .annotation-panel .annotation-arrow::after {
        content: '';
        position: absolute;
        right: -1px;
        top: -3px;
        border: 4px solid transparent;
        border-left: 5px solid var(--background-400);
      }
      /* Arrow: input annotation */
      .annotation-input .annotation-label {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
      }
      .annotation-input .annotation-arrow {
        bottom: 88px;
        left: 50%;
        transform: translateX(-50%);
        width: 1.5px;
        height: 10px;
      }
      .annotation-input .annotation-arrow::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: -3px;
        border: 4px solid transparent;
        border-top: 5px solid var(--background-400);
      }
    </style>
</body>
</html>
