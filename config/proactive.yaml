# Aerie · 云栖 v13.9.8 — Proactive Push (Auto-Wake) Configuration
# All comments are in English. This file is the source of truth for
# PushPolicy + CronScheduler.

proactive:
  enabled: true                            # Global kill-switch
  max_per_day: 5                           # Daily cap across all scenes
  min_interval_min: 30                     # Min minutes between any two pushes
  quiet_start: "23:30"                     # Quiet period start (HH:MM)
  quiet_end: "07:00"                       # Quiet period end (HH:MM)
  exempt_scenes:                           # Scenes that bypass quiet period
    - morning_brief
    - goodnight
    - anniversary
  timezone: "Asia/Shanghai"

# Each scene defines a Cron schedule (or event trigger), a template,
# and a mood_aware flag for Brain.generate_push.
scenes:
  morning_brief:
    template: "早安。{weather}今天{date}。"
    cron: "30 6,7 * * *"
    mood_aware: true
    exempt_quiet: true

  # Block-4A R1.5: 9am dedicated daily brief (custom_dispatcher=brief).
  # Runs brief_fetcher + compose_brief, emits "brief:show" SSE event.
  morning_brief_9am:
    custom_dispatcher: "brief"
    cron: "0 9 * * *"
    mood_aware: false
    exempt_quiet: true

  # Block-4B R2.2: desire-driven short text triggers (24h polling).
  # Reroute idle_care to use the desire engine when a desire instance
  # is alive; falls back to old trigger-based path otherwise.
  idle_care:
    template: "在干嘛。"
    trigger: "user_idle_4h"
    custom_dispatcher: "desire_care"
    mood_aware: true
    exempt_quiet: false

  voice_miss:
    template: "想听你声音。"
    trigger: "desire_voice"
    custom_dispatcher: "desire_voice"
    mood_aware: true
    exempt_quiet: false

  # R7.5+: 应用启动后主动 QQ 推送。exempt_quiet=true (忽略静默时段),
  # 不依赖 cron 触发,由 companion._boot_qq_greeting 在 start() 时调用。
  # judge_override 让 ProactiveJudge 强制放行,同时保持屏幕隔空人设。
  # R8.1+: force=true 让 push_scheduler 跳过 ProactiveJudge + PushPolicy
  # 抑制,确保每次启动都发。flag 60s 窗口防快速重启刷屏。
  boot_greeting:
    template: "刚醒。盯着屏幕看你头像。"
    custom_dispatcher: "boot_greeting"
    mood_aware: true
    exempt_quiet: true
    force: true

  weather_push:
    template: "{city}今天{weather}，{temp}度。{suggestion}。"
    cron: "0 7 * * *"
    mood_aware: false
    exempt_quiet: false

  lunch_remind:
    template: "吃饭。"
    cron: "30 11,12 * * *"
    mood_aware: true
    exempt_quiet: false

  evening_check:
    template: "今天怎么样。"
    cron: "30 17,18 * * *"
    mood_aware: true
    exempt_quiet: false

  goodnight:
    template: "睡吧。"
    cron: "30 22,23 * * *"
    mood_aware: true
    exempt_quiet: true

  todo_remind:
    template: "{todo_count}件事没做。"
    cron: "0 9-21 * * *"
    mood_aware: false
    exempt_quiet: false

  anniversary:
    template: "今天{anniversary_name}。{days}天了。"
    cron: "0 0 * * *"
    mood_aware: true
    exempt_quiet: true

  idle_care:
    template: "在干嘛。"
    trigger: "user_idle_4h"
    mood_aware: true
    exempt_quiet: false

  emotion_comfort:
    template: "……{comfort_word}。"
    trigger: "cumulative_threshold_break"
    mood_aware: true
    exempt_quiet: false

